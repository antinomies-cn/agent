services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://pypi.org/simple}"
        PIP_EXTRA_INDEX_URL: "${PIP_EXTRA_INDEX_URL:-}"
        PIP_TRUSTED_HOST: "${PIP_TRUSTED_HOST:-}"
        PIP_DEFAULT_TIMEOUT: "${PIP_DEFAULT_TIMEOUT:-240}"
        PIP_RETRIES: "${PIP_RETRIES:-10}"
    container_name: chatbot-agent
    restart: unless-stopped
    command: ["sh", "-c", "python app/startup_check.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    environment:
      ENV: "prod"
      REDIS_HOST: "myredis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-64588515}"
      REDIS_DB: "0"
      MEMORY_TTL: "86400"
      MEMORY_COMPACT_MESSAGE_COUNT: "10"
      MOOD_TIMEOUT_SECONDS: "5"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_API_BASE: "${OPENAI_API_BASE}"
      OPENAI_MODEL: "${OPENAI_MODEL}"
      EMBEDDINGS_API: "${EMBEDDINGS_API:-openai}"
      EMBEDDINGS_MODEL: "${EMBEDDINGS_MODEL:-text-embedding-3-small}"
      EMBEDDINGS_DIMENSION: "${EMBEDDINGS_DIMENSION:-}"
      EMBEDDINGS_LOCAL_FILES_ONLY: "${EMBEDDINGS_LOCAL_FILES_ONLY:-false}"
      EMBEDDINGS_STARTUP_CHECK: "${EMBEDDINGS_STARTUP_CHECK:-true}"
      EMBEDDINGS_HF_ENDPOINT: "${EMBEDDINGS_HF_ENDPOINT:-}"
      EMBEDDINGS_CACHE_DIR: "${EMBEDDINGS_CACHE_DIR:-/app/model_cache}"
      SERPAPI_API_KEY: "${SERPAPI_API_KEY:-}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:6333}"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-64588515}"
      XINGPAN_APP_ID: "${XINGPAN_APP_ID:-}"
      XINGPAN_APP_KEY: "${XINGPAN_APP_KEY:-}"
      ASTRO_UID: "${ASTRO_UID:-}"
      WEB_LOADER_VERIFY_SSL: "${WEB_LOADER_VERIFY_SSL:-true}"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./qdrant_data:/app/qdrant_data
      - ./model_cache:/app/model_cache
      - ./app:/app/app

  redis:
    image: redis:7-alpine
    container_name: myredis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-64588515}", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-64588515}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: myqdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:-64588515}"
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  redis_data:
  qdrant_storage:
