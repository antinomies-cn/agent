services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENV: "prod"
      REDIS_HOST: "myredis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-64588515}"
      REDIS_DB: "0"
      MEMORY_TTL: "86400"
      MEMORY_COMPACT_MESSAGE_COUNT: "10"
      MOOD_TIMEOUT_SECONDS: "5"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_API_BASE: "${OPENAI_API_BASE}"
      OPENAI_MODEL: "${OPENAI_MODEL}"
      SERPAPI_API_KEY: "${SERPAPI_API_KEY:-}"
      XINGPAN_APP_ID: "${XINGPAN_APP_ID:-}"
      XINGPAN_APP_KEY: "${XINGPAN_APP_KEY:-}"
      ASTRO_UID: "${ASTRO_UID:-}"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./qdrant_data:/app/qdrant_data

  redis:
    image: redis:7-alpine
    container_name: myredis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-64588515}", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-64588515}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

volumes:
  redis_data:
