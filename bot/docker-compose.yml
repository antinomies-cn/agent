services:
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.82.0-stable
    pull_policy: if_not_present
    container_name: litellm-proxy
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0", "--num_workers", "4"]
    ports:
      - "4001:4000"
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY}"
      MIN_API_KEY: "${MIN_API_KEY}"
      MIN_API_BASE: "${MIN_API_BASE}"
      DEEP_API_KEY: "${DEEP_API_KEY}"
      DEEP_API_BASE: "${DEEP_API_BASE}"
      GLM_API_KEY: "${GLM_API_KEY}"
      GLM_API_BASE: "${GLM_API_BASE}"
      BGE_API_KEY: "${BGE_API_KEY}"
      BGE_API_BASE: "${BGE_API_BASE}"
      RERANK_API_KEY: "${RERANK_API_KEY}"
      RERANK_API_BASE: "${RERANK_API_BASE}"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; k = os.environ.get('LITELLM_MASTER_KEY', ''); req = urllib.request.Request('http://localhost:4000/health', headers={'Authorization': 'Bearer ' + k} if k else {}); r = urllib.request.urlopen(req, timeout=3); raise SystemExit(0 if r.status == 200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s 
    env_file: .env

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://pypi.org/simple}"
        PIP_EXTRA_INDEX_URL: "${PIP_EXTRA_INDEX_URL:-}"
        PIP_TRUSTED_HOST: "${PIP_TRUSTED_HOST:-}"
        PIP_DEFAULT_TIMEOUT: "${PIP_DEFAULT_TIMEOUT:-240}"
        PIP_RETRIES: "${PIP_RETRIES:-10}"
    container_name: chatbot-agent
    restart: unless-stopped
    command: ["sh", "-c", "python app/startup_check.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; r = urllib.request.urlopen('http://localhost:8000/health/live', timeout=5); d = json.loads(r.read().decode('utf-8')); raise SystemExit(0 if d.get('status') == 'healthy' else 1)\"",
        ]
      interval: 10s
      timeout: 8s
      retries: 10
      start_period: 20s
    env_file: .env
    environment:
      ENV: "${ENV:-dev}"
      REDIS_HOST: "myredis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-64588515}"
      REDIS_DB: "0"
      MEMORY_TTL: "86400"
      MEMORY_COMPACT_MESSAGE_COUNT: "10"
      MOOD_TIMEOUT_SECONDS: "5"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_API_BASE: "${OPENAI_API_BASE:-http://litellm:4000}"
      OPENAI_MODEL: "${OPENAI_MODEL:-MiniMax-M2.5}"
      OPENAI_EMBEDDINGS_API_BASE: "${OPENAI_EMBEDDINGS_API_BASE:-}"
      EMBEDDINGS_MODEL: "${EMBEDDINGS_MODEL:-bge-m3}"
      EMBEDDINGS_DIMENSION: "${EMBEDDINGS_DIMENSION:-}"
      EMBEDDINGS_TIMEOUT: "${EMBEDDINGS_TIMEOUT:-30}"
      EMBEDDINGS_STARTUP_CHECK: "${EMBEDDINGS_STARTUP_CHECK:-true}"
      RERANK_ENABLED: "${RERANK_ENABLED:-true}"
      RERANK_MODEL: "${RERANK_MODEL:-bge-reranker}"
      RERANK_UPSTREAM_MODEL: "${RERANK_UPSTREAM_MODEL:-bge-reranker-v2-m3}"
      RERANK_DIRECT_UPSTREAM: "${RERANK_DIRECT_UPSTREAM:-true}"
      RERANK_TIMEOUT: "${RERANK_TIMEOUT:-15}"
      RERANK_TOP_N: "${RERANK_TOP_N:-}"
      SERPAPI_API_KEY: "${SERPAPI_API_KEY:-}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:6333}"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-64588515}"
      XINGPAN_APP_ID: "${XINGPAN_APP_ID:-}"
      XINGPAN_APP_KEY: "${XINGPAN_APP_KEY:-}"
      ASTRO_UID: "${ASTRO_UID:-}"
      WEB_LOADER_VERIFY_SSL: "${WEB_LOADER_VERIFY_SSL:-true}"
      ADD_URLS_WRITE_ENABLED: "${ADD_URLS_WRITE_ENABLED:-true}"
    depends_on:
      litellm:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./qdrant_data:/app/qdrant_data
      - ./model_cache:/app/model_cache
      - ./app:/app/app

  redis:
    image: redis:7-alpine
    container_name: myredis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-64588515}", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-64588515}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s 
    volumes:
      - redis_data:/data
    env_file: .env

  qdrant:
    image: qdrant/qdrant:latest
    container_name: myqdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:-64588515}"
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:  
      test: ["CMD-SHELL", "cat /proc/net/tcp /proc/net/tcp6 | grep -qi '00000000:18BD'"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    env_file: .env

volumes:
  redis_data:
  qdrant_storage:
